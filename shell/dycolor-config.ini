# dycolor 配置文件
# 第一行指定目标.colors文件的绝对路径
[dycolor]poll_interval_seconds=3

# 颜色映射规则
# 格式: [section]key=pywal颜色索引(1-16)
# pywal颜色索引对应~/.cache/wal/colors文件中的行号
# 索引从1开始: 1=背景色(最暗), 7=前景色(最亮), 2-6,8-16=其他颜色

# 按钮颜
[Colors:Button]BackgroundNormal=3

# 视图颜色
[Colors:View]BackgroundNormal=1
[Colors:View]BackgroundAlternate=1
[Colors:View]ForegroundLink=16

# 窗口颜色
[Colors:Window]BackgroundNormal=1
# 标题栏颜色
[Colors:Header]BackgroundNormal=1

# 提示框颜色
[Colors:Tooltip]BackgroundNormal=1

# WM颜色（窗口管理器）
[WM]activeBackground=1
[WM]inactiveBackground=1
